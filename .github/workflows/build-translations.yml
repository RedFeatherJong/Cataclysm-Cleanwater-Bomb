name: Build translations
on:
  workflow_dispatch:
  workflow_call:
    secrets:
      TX_TOKEN:
        required: false

jobs:
  build-translations:

    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read
    env:
      TX_TOKEN: ${{ secrets.TX_TOKEN }}
    steps:
      - name: Install gettext
        if: ${{ env.TX_TOKEN != '' }}
        run: sudo apt-get install gettext

      - name: Install Transifex CLI
        if: ${{ env.TX_TOKEN != '' }}
        run: |
          curl -sL https://github.com/transifex/cli/releases/download/v1.6.17/tx-linux-amd64.tar.gz | sudo tar zxvf - -C /usr/bin tx

      - name: Checkout local repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: master
          sparse-checkout: |
            .tx
            tools
            lang
          fetch-depth: 1
          persist-credentials: false

      - name: Pull translations
        if: ${{ env.TX_TOKEN != '' }}
        run: tx pull -a --force -w 2

      - name: Reuse translations from latest successful master build
        if: ${{ env.TX_TOKEN == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow matrix.yml \
            --branch master --event push --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId')"
          if [ -z "$run_id" ]; then
            echo "::error::No successful master translation artifact is available"
            exit 1
          fi
          echo "::notice::TX_TOKEN unavailable; using translations from trusted master run $run_id"
          artifact_dir="$RUNNER_TEMP/master-translations"
          gh run download "$run_id" --repo "$GITHUB_REPOSITORY" \
            --name translations --dir "$artifact_dir"
          cp -a "$artifact_dir/." .

      - name: Validate and discard invalid translations
        if: ${{ env.TX_TOKEN != '' }}
        run: ./lang/discard_invalid_po.sh

      - name: Update translation statistics
        if: ${{ env.TX_TOKEN != '' }}
        run: ./lang/update_stats.sh

      - name: Compile translations
        if: ${{ env.TX_TOKEN != '' }}
        run: ./lang/compile_mo.sh all

      - name: Store translation artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: "translations"
          path: |
            lang/po
            lang/mo
            src/lang_stats.inc
          if-no-files-found: error
